<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestilling</title>
    <script src="./app.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <header id="header">
            <h1>CRAFTSVILLA</h1>
            <nav>
                <a href="index">Hjem</a>
                <a href="ordering">Bestilling</a>
                <a href="#galleri">Galleri</a>
                <a href="#feedback">Tilbakemelding</a>
            </nav>
        </header>
    
        <main>
            <section id="ordering">
                <div class="ordering-container">
                    <h2>Workshops i nærheten</h2>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d476632.8917587868!2d5.531032012206915!3d62.182964541840484!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sBurger%20King!5e0!3m2!1sen!2sno!4v1773916485644!5m2!1sen!2sno"  style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    <form>
                        <select id="valg-omeråde">
                            <option value="ålesund">Ålesund</option>
                            <option value="Ulstein">Ulstein</option>
                            <option value="Volda">Volda</option>
                            <option value="Ørsta">Ørsta</option>
                        </select>

                        <select id="valg-workshop">
                            <option value="mosaikk">Mosaikk</option>
                            <option value="Akvarellmaling">Akvarellmaling</option>
                            <option value="Lerretsmaling">Lerretsmaling</option>
                        </select>

                        <div class="user-info">
                            <div class="user-info-input">
                                <label for="navn">Navn:</label>
                                <input id="navn" type="text" placeholder="Navn">
                            </div>
                            <div class="user-info-input">
                                <label for="navn">E-Mail:</label>
                                <input id="email" type="email" placeholder="E-Mail" autocomplete="email">
                            </div>
                            <div class="user-info-input">
                                <label for="navn">Mobil:</label>              
                                <input id="mobil" type="text" placeholder="Mobil">
                            </div>
                        </div>


                        <button type="submit">Bestill</button>
                    </form>
                </div>
            </section>
        </main>
        

        <footer>
            footer
        </footer>
    </div>

</body>
</html>
